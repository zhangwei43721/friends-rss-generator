name: update-friends-posts

permissions:
  contents: write
  actions: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0,6,12,18,21 * * *"
  workflow_dispatch:

env:
  # 通用配置
  SIMPLE_MODE: true # 极简模式是否开启
  STORAGE_TYPE: ${{ secrets.STORAGE_TYPE }} # 请修改为你的存储方式，默认为leancloud
  PROXY: ${{ secrets.PROXY }} # 可选，http代理
  # leancloud配置
  APPID: ${{ secrets.APPID }}
  APPKEY: ${{ secrets.APPKEY }}
  # mysql配置
  MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
  MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
  MYSQL_IP: ${{ secrets.MYSQL_IP }}
  MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
  MYSQL_DB: ${{ secrets.MYSQL_DB }}
  # sqlite配置
  GITHUB_NAME: ${{ secrets.GH_NAME }}
  GITHUB_EMAIL: ${{ secrets.GH_EMAIL }}
  # mongodb配置
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.9

    - name: Install requirements
      working-directory: ./hexo_circle_of_friends
      run: |
        pip install -r requirements.txt

    - name: set env
      run: |
        echo "BASE_PATH=$(pwd)" >> $GITHUB_ENV && echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

    - name: Configure Git
      run: |
        git config --global user.name "${{ env.GITHUB_NAME || 'github-actions[bot]' }}"
        git config --global user.email "${{ env.GITHUB_EMAIL || 'github-actions[bot]@noreply.github.com' }}"

    - name: leancloud Update posts
      if: ${{ env.STORAGE_TYPE == 'leancloud' }}
      env:
        APPID: ${{ secrets.APPID }}
        APPKEY: ${{ secrets.APPKEY }}
        LINK: ${{ secrets.LINK }}
        PROXY: ${{ secrets.PROXY }}
      working-directory: ./hexo_circle_of_friends
      run: |
        python run.py

    - name: mysql Update posts
      if: ${{ env.STORAGE_TYPE == 'mysql' }}
      env:
        MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
        MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        MYSQL_IP: ${{ secrets.MYSQL_IP }}
        MYSQL_DB: ${{ secrets.MYSQL_DB }}
      working-directory: ./hexo_circle_of_friends
      run: |
        python run.py

    - name: sqlite Update posts
      if: ${{ env.STORAGE_TYPE == 'sqlite' || env.SIMPLE_MODE == 'true' }}
      env:
        PYTHONPATH: ${{ env.PYTHONPATH }}
        SQLITE_DB: ${{ secrets.SQLITE_DB }}
      run: |
        python ./hexo_circle_of_friends/run.py

    - name: Push sqlite data
      if: ${{ env.STORAGE_TYPE == 'sqlite' }}
      run: |
        if [ -f "data.db" ]; then
          git add data.db
          git commit -m "Update data.db" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"
        fi

    - name: mongodb Update posts
      if: ${{ env.STORAGE_TYPE == 'mongodb' }}
      env:
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
      working-directory: ./hexo_circle_of_friends
      run: |
        python run.py

    - name: simple mode transform
      if: ${{ env.SIMPLE_MODE == 'true' }}
      run: |
        python ./hexo_circle_of_friends/utils/simple_mode_transform_json.py

    - name: simple mode push
      if: ${{ env.SIMPLE_MODE == 'true' }}
      run: |
        # 创建或切换到 output 分支
        git fetch origin output || true
        git checkout -B output

        # 添加生成的 JSON 文件
        git add -A
        git commit -m "Generate Json" || echo "No changes to commit"

        # 强制推送到 output 分支
        git push origin output --force

    - name: Keep workflow alive
      if: github.event_name == 'schedule'
      run: |
        # 每30天创建一次空提交以保持工作流活跃
        last_commit_date=$(git log -1 --format=%ct)
        current_date=$(date +%s)
        days_since_last_commit=$(( (current_date - last_commit_date) / 86400 ))

        if [ $days_since_last_commit -gt 30 ]; then
          git commit --allow-empty -m "Keep workflow alive"
          git push origin main
        fi
